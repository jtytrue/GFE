<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="GFE"/>
<link rel="apple-touch-icon" href="apple-touch-icon.png"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover"/>
<title>GFE Field App</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:#0f0f0f;color:#f0f0f0;
  font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text',Helvetica,sans-serif;
  overscroll-behavior:none;-webkit-text-size-adjust:100%}
#root{height:100%}
input[type=number]::-webkit-inner-spin-button,
input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none}
input[type=number]{-moz-appearance:textfield;appearance:textfield}
@keyframes fadeUp{from{opacity:0;transform:translateY(18px) scale(.96)}to{opacity:1;transform:none}}
@keyframes ticker{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
@keyframes splashFade{0%{opacity:1}78%{opacity:1}100%{opacity:0}}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes checkPop{0%{transform:scale(1)}50%{transform:scale(1.25)}100%{transform:scale(1)}}
.splash{position:fixed;inset:0;z-index:999;background:#0f0f0f;
  display:flex;flex-direction:column;align-items:center;justify-content:flex-start;
  gap:20px;padding-top:18vh;animation:splashFade 3.2s ease forwards;pointer-events:none}
.screen{display:flex;flex-direction:column;height:100vh;height:100dvh;overflow:hidden}
.topbar{padding:16px 20px 12px;border-bottom:1px solid #1e1e1e;
  display:flex;align-items:center;gap:12px;flex-shrink:0;
  padding-top:max(16px,env(safe-area-inset-top))}
.topbar-title{font-size:17px;font-weight:600;letter-spacing:.01em}
.topbar-sub{font-size:12px;color:#888;margin-top:2px}
.content{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
.content::-webkit-scrollbar{display:none}
.back-btn{width:34px;height:34px;display:flex;align-items:center;justify-content:center;
  background:none;border:none;cursor:pointer;color:#e8402a;flex-shrink:0;
  font-size:26px;line-height:1;padding:0}
.section-label{font-size:11px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;
  color:#555;padding:20px 20px 8px}
.list-row{padding:15px 20px;border-bottom:1px solid #1a1a1a;
  display:flex;align-items:center;gap:12px;cursor:pointer;
  transition:background .1s;-webkit-user-select:none;user-select:none}
.list-row:active{background:#161616}
.row-title{font-size:15px;font-weight:500}
.row-sub{font-size:12px;color:#666;margin-top:3px}
.chevron{color:#444;font-size:20px;margin-left:auto;flex-shrink:0}
.new-btn{margin:20px 20px 0;padding:15px;border:1.5px dashed #333;border-radius:10px;
  background:none;color:#e8402a;font-size:14px;font-weight:600;
  width:calc(100% - 40px);cursor:pointer;display:flex;align-items:center;
  justify-content:center;gap:8px;transition:background .1s}
.new-btn:active{background:#190909}
.status-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.dot-done{background:#4caf50}
.dot-pending{background:#2a2a2a;border:1.5px solid #444}
.badge{font-size:10px;font-weight:700;letter-spacing:.05em;padding:2px 7px;border-radius:10px;flex-shrink:0}
.badge-done{background:#0d2b0d;color:#4caf50;border:1px solid #4caf5033}
.badge-open{background:#1a0909;color:#e8402a;border:1px solid #e8402a33}
.cl-icon{width:38px;height:38px;border-radius:9px;background:#180808;
  border:1px solid #e8402a22;display:flex;align-items:center;justify-content:center;
  font-size:17px;flex-shrink:0}
.form-area{background:#0a0a0a;border-bottom:2px solid #1e1e1e;padding:4px 0}
.form-row{display:flex;align-items:center;padding:11px 20px;border-bottom:1px solid #141414}
.form-row:last-child{border-bottom:none}
.form-label{font-size:13px;color:#888;width:130px;flex-shrink:0}
.form-input{flex:1;background:none;border:none;outline:none;color:#f0f0f0;
  font-size:14px;font-family:inherit;text-align:right}
.form-input::placeholder{color:#3a3a3a}
.cl-section-header{padding:14px 20px 7px;font-size:12px;font-weight:700;
  letter-spacing:.07em;text-transform:uppercase;color:#e8402a;border-top:1px solid #1a1a1a}
.cl-item{padding:13px 16px;border-bottom:1px solid #141414;
  display:flex;align-items:flex-start;gap:12px;cursor:pointer;
  -webkit-user-select:none;user-select:none;transition:background .08s}
.cl-item:active{background:#141414}
.cl-item.is-checked .item-text{text-decoration:line-through;color:#555}
.item-check{width:26px;height:26px;border-radius:7px;border:2px solid #2a2a2a;
  flex-shrink:0;margin-top:1px;display:flex;align-items:center;justify-content:center;
  transition:all .15s;background:#0a0a0a}
.item-check.checked{background:#e8402a;border-color:#e8402a;animation:checkPop .18s ease}
.item-text{flex:1;font-size:13px;line-height:1.55;color:#ccc}
.remark-dot{width:7px;height:7px;border-radius:50%;background:#e8402a;flex-shrink:0;margin-top:8px}
.remark-preview{font-size:11px;color:#e8402a99;font-style:italic;
  padding:3px 16px 8px 54px;cursor:pointer}
.bottom-bar{padding:14px 20px;border-top:1px solid #1e1e1e;flex-shrink:0;
  padding-bottom:max(14px,env(safe-area-inset-bottom))}
.submit-btn{width:100%;padding:15px;background:#e8402a;border:none;border-radius:10px;
  color:white;font-size:15px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;
  cursor:pointer;transition:opacity .15s}
.submit-btn:active{opacity:.8}
.submit-btn:disabled{opacity:.25;pointer-events:none}
.hint{font-size:11px;color:#555;text-align:center;margin-top:8px}
.modal-overlay{position:fixed;inset:0;z-index:100;background:rgba(0,0,0,.75);
  animation:fadeIn .2s ease;display:flex;align-items:flex-end}
.modal-sheet{width:100%;background:#181818;border-radius:20px 20px 0 0;padding:20px;
  animation:slideUp .28s ease}
.modal-handle{width:36px;height:4px;border-radius:2px;background:#333;margin:0 auto 16px}
.modal-label{font-size:12px;color:#666;margin-bottom:10px;text-transform:uppercase;letter-spacing:.08em}
.modal-textarea{width:100%;background:#111;border:1px solid #2a2a2a;border-radius:10px;
  color:#f0f0f0;font-size:14px;font-family:inherit;padding:12px;resize:none;outline:none;min-height:88px}
.modal-actions{display:flex;gap:9px;margin-top:11px}
.modal-btn{flex:1;padding:13px;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;border:none}
.btn-cancel{background:#222;color:#666}
.btn-save{background:#e8402a;color:white}
.form-modal-overlay{position:fixed;inset:0;z-index:100;background:rgba(0,0,0,.88);
  display:flex;align-items:flex-end;animation:fadeIn .2s}
.form-modal{width:100%;background:#141414;border-radius:20px 20px 0 0;
  padding:20px 20px max(40px,env(safe-area-inset-bottom));
  animation:slideUp .28s ease;max-height:82vh;overflow-y:auto}
.field-group{margin-bottom:14px}
.field-label{font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:#555;
  margin-bottom:6px;font-weight:600}
.field-input{width:100%;background:#1e1e1e;border:1px solid #282828;border-radius:8px;
  color:#f0f0f0;font-size:15px;font-family:inherit;padding:12px;outline:none}
.field-input:focus{border-color:#e8402a55}
.field-input::placeholder{color:#3a3a3a}
.progress-bar{height:2px;background:#1a1a1a;flex-shrink:0}
.progress-fill{height:100%;background:#e8402a;transition:width .3s ease}
.home-btn{display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:12px;padding:28px 20px;background:#141414;border:1.5px solid #222;
  border-radius:16px;cursor:pointer;transition:all .15s;flex:1}
.home-btn:active{background:#1a1a1a;border-color:#e8402a44}
.home-btn-icon{font-size:32px}
.home-btn-label{font-size:14px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;color:#ccc}
.group-header{padding:8px 20px;background:#0d0d0d;border-bottom:1px solid #1a1a1a;
  display:flex;align-items:center;gap:8px;cursor:pointer;-webkit-user-select:none;user-select:none}
.group-label{font-size:12px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#e8402a}
.group-count{font-size:11px;color:#555;margin-left:auto}
.obs-row{display:flex;align-items:center;padding:12px 20px;border-bottom:1px solid #141414}
.obs-label{font-size:13px;font-weight:500;flex:1}
.obs-meta{font-size:11px;color:#555;margin-top:2px}
.picker-row{padding:14px 20px;border-bottom:1px solid #1a1a1a;display:flex;align-items:center;
  gap:12px;cursor:pointer}
.picker-row:active{background:#161616}
</style>
</head>

<div id="root"></div>
