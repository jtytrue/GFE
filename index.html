// ═══════════════════════ ONEDRIVE WRITE-BACK ═══════════════════════
async function modifyChecklist(sub, token) {
  const def = CHECKLISTS[sub.checklistId];
  if (!def.onedrivePath || !token || !sub.projectFolderId) return false;
  const folderId = sub.projectFolderId;
  const relPath = def.onedrivePath;
  const url = '/me/drive/items/' + folderId + ':/' + relPath + ':/content';
  const ab = await graphGetBinary(url, token);
  const zip = await JSZip.loadAsync(ab);
  let xml = await zip.file('word/document.xml').async('string');
  const h = sub.header;
  const reps = {
    '{{DATE}}': h.date || '',
    '{{LOT}}': h.lot || '',
    '{{SUBDIVISION}}': h.subdivision || '',
    '{{TEMP}}': h.temp || '',
    '{{BY}}': h.by || ''
  };
  const offset = def.placeholderOffset || 0;
  def.sections.forEach((s, si) => {
    s.items.forEach((_, ii) => {
      const prevItems = def.sections.slice(0, si).reduce((a, x) => a + x.items.length, 0);
      const n = offset + prevItems + ii;
      const st = sub.items[si + '_' + ii] || {};
      reps['{{CHK_' + n + '}}'] = st.checked ? '\u2713' : '';
      reps['{{RMK_' + n + '}}'] = (st.remark || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    });
  });
  for (const [k, v] of Object.entries(reps)) {
    xml = xml.split(k).join(v);
  }
  zip.file('word/document.xml', xml);
  const blob = await zip.generateAsync({
    type: 'blob',
    mimeType: 'application/vnd.openxmlformats-officedocument.wordprocessingml.document'
  });
  await graphPut(url, blob, token);
  return true;
}
